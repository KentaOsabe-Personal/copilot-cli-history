# MySQL. Versions 5.6.4 and up are supported.
#
# Install the MySQL driver
#   gem install mysql2
#
# Ensure the MySQL gem is defined in your Gemfile
#   gem "mysql2"
#
# And be sure to use new-style password hashing:
#   https://dev.mysql.com/doc/refman/5.7/en/password-hashing.html
#
default: &default
  adapter: mysql2
  encoding: utf8mb4
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DB_USERNAME") { "copilot" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "copilot" } %>
  host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("DB_PORT") { 3306 } %>

development:
  <<: *default
  database: <%= ENV.fetch("DB_NAME") { "copilot_cli_history_development" } %>

test:
  <<: *default
  database: <%= ENV.fetch("DB_TEST_NAME") { "copilot_cli_history_test" } %>

production:
  <<: *default
  database: <%= ENV.fetch("DB_NAME") { "copilot_cli_history_production" } %>
